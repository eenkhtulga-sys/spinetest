<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Spine Project</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/@esotericsoftware/spine-player@4.1/dist/iife/spine-player.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@esotericsoftware/spine-player@4.1/dist/spine-player.css">

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Spine-ийг голд байрлуулах */
        #spine-container {
            width: 300px; height: 300px;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100; display: none;
            pointer-events: none;
        }

        /* iOS камерын хар дэлгэцийг засах CSS */
        video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* Ачаалж буйг харуулах UI */
        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center;
            align-items: center; z-index: 999; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading-screen" class="loading">Түр хүлээнэ үү... Камер ачаалж байна.</div>
    <div id="spine-container"></div>

    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
        color-space="sRGB" 
        embedded
        renderer="colorManagement: true, physicallyCorrectLights: false" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: true">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="ar-target" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#ar-target');
        const spineDiv = document.querySelector('#spine-container');
        const loadingScreen = document.querySelector('#loading-screen');
        let player = null;

        // Камер ажиллаж эхлэхэд loading-ийг нуух
        document.querySelector('a-scene').addEventListener("renderstart", () => {
            loadingScreen.style.display = "none";
        });

        // Маркер олдсон үед
        targetEl.addEventListener("targetFound", () => {
            console.log("Маркер олдлоо!");
            spineDiv.style.display = "block";
            if (!player) {
                player = new spine.SpinePlayer("spine-container", {
                    jsonUrl: "https://esotericsoftware.com/files/examples/4.1/spineboy/export/spineboy-pro.json",
                    atlasUrl: "https://esotericsoftware.com/files/examples/4.1/spineboy/export/spineboy-pro.atlas",
                    animation: "run",
                    alpha: true,
                    backgroundColor: "#00000000",
                    showControls: false
                });
            }
        });

        // Маркер алга болоход
        targetEl.addEventListener("targetLost", () => {
            spineDiv.style.display = "none";
        });
    </script>
</body>
</html>
